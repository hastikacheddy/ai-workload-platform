apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-copilot
  labels:
    app.kubernetes.io/name: platform-copilot
    app.kubernetes.io/part-of: ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-copilot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-copilot
        app.kubernetes.io/part-of: ai-platform
    spec:
      containers:
        - name: api
          # Built from platform-copilot/Dockerfile; push to your registry first.
          image: ghcr.io/hastikacheddy/platform-copilot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: platform-copilot-config
            - secretRef:
                name: platform-copilot-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
