# Milestone 0 — data-plane services.
# Airflow (M1) and Langfuse (M5) are added in their own milestones so the stack
# grows only as the code that needs it lands. The API runs on the host in M0
# (`uv run uvicorn ...`) and gets containerized alongside Airflow in M1.
name: platform-copilot

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: platform_copilot
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - osdata:/usr/share/opensearch/data

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

  # Langfuse (tracing + cost). Opt-in, since it is only useful once you have keys:
  #   docker compose --profile observability up -d langfuse-db langfuse
  # Then open http://localhost:3001, create a project, and copy the public/secret
  # keys into LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY. Without keys the app uses
  # a NullSink and records nothing.
  langfuse-db:
    image: postgres:16
    profiles: ["observability"]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfusedata:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    depends_on:
      - langfuse-db
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3001}
      NEXTAUTH_SECRET: local-dev-secret-change-me
      SALT: local-dev-salt-change-me
    ports:
      - "${LANGFUSE_PORT:-3001}:3000"

volumes:
  pgdata:
  osdata:
  ollamadata:
  langfusedata:
